<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Run Tracker</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<header>
    <h1>Fitness Tracker</h1>
</header>

<!-- Tab Navigation -->
<div class="tab-nav">
    <button class="tab-btn active" onclick="switchTab('home')">Run</button>
    <button class="tab-btn" onclick="switchTab('training')">Training</button>
    <button class="tab-btn" onclick="switchTab('stats')">Stats</button>
</div>

<!-- Home Tab -->
<div id="homeTab" class="tab-content active">
    <div class="stats-grid">
        <div class="stat-card">
            <h3>Week</h3>
            <div class="value" id="weekTotal">0</div>
            <div class="unit">Miles</div>
            <div class="change neutral" id="weekChange">--</div>
        </div>
        <div class="stat-card">
            <h3>Month</h3>
            <div class="value" id="monthTotal">0</div>
            <div class="unit">Miles</div>
            <div class="change neutral" id="monthChange">--</div>
        </div>
        <div class="stat-card">
            <h3>Year</h3>
            <div class="value" id="yearTotal">0</div>
            <div class="unit">Miles</div>
        </div>
    </div>

    <div class="input-section">
        <div class="input-row">
            <div class="input-group">
                <label>Date</label>
                <input type="date" id="dateInput">
            </div>
            <div class="input-group">
                <label>Distance (mi)</label>
                <input type="number" id="distanceInput" placeholder="0.0" inputmode="decimal" step="0.01">
            </div>
            <div class="input-group duration-group">
                <label>Duration</label>
                <div class="duration-inputs">
                    <input type="number" id="durationMin" placeholder="min" inputmode="numeric" min="0">
                    <span class="duration-sep">:</span>
                    <input type="number" id="durationSec" placeholder="sec" inputmode="numeric" min="0" max="59">
                </div>
            </div>
        </div>
        <button class="add-btn" onclick="addRun()">Add Run</button>
        <button class="download-btn" onclick="downloadCSV()">Download Data</button>
    </div>

    <div class="history-section">
        <div class="history-header">Recent Activity</div>
        <div class="table-wrapper">
            <table id="historyTable">
                <tbody id="historyBody"></tbody>
            </table>
        </div>
    </div>
</div>

<!-- Training Tab -->
<div id="trainingTab" class="tab-content">
    <div class="training-scroll">
        <!-- Session Input -->
        <div class="input-section">
            <div class="input-row">
                <div class="input-group">
                    <label>Date</label>
                    <input type="date" id="trainingDateInput">
                </div>
            </div>
            <div class="input-row">
                <div class="input-group" style="flex:2">
                    <label>Exercise</label>
                    <select id="exerciseSelect" onchange="onExerciseSelectChange()">
                        <option value="">-- Pick or add new --</option>
                        <option value="__new__">+ New exercise…</option>
                    </select>
                    <input type="text" id="exerciseNameInput" placeholder="Type exercise name" style="display:none; margin-top:6px;" autocomplete="off">
                </div>
            </div>
            <div class="input-row">
                <div class="input-group">
                    <label>Sets</label>
                    <input type="number" id="exerciseSets" placeholder="3" inputmode="numeric" min="1">
                </div>
                <div class="input-group">
                    <label>Reps</label>
                    <input type="tel" id="exerciseReps" placeholder="10" pattern="[0-9]*">
                </div>
                <div class="input-group">
                    <label>Weight</label>
                    <input type="tel" id="exerciseWeight" placeholder="lbs" pattern="[0-9.]*">
                </div>
            </div>
            <button class="add-btn" onclick="addExerciseToSession()">+ Add Exercise</button>
        </div>

        <!-- Current Session -->
        <div class="training-card">
            <div class="training-card-title">Current Session</div>
            <div id="currentSessionBody"></div>
            <button class="save-session-btn" onclick="saveWorkoutSession()">Save Workout</button>
        </div>

        <!-- Workout History -->
        <div class="training-card">
            <div class="training-card-title">Workout History</div>
            <div id="workoutHistoryBody"></div>
        </div>
    </div>
</div>

<!-- Stats Tab -->
<div id="statsTab" class="tab-content">
    <div class="stats-scroll">
        <!-- Goal Tracking -->
        <div class="goal-section">
            <div class="chart-title-small">🎯 Yearly Goals</div>
            <div id="goalTracking"></div>
        </div>

        <!-- Weekly Chart -->
        <div class="chart-section-compact">
            <div class="chart-title-small">Weekly Distance (Last 12 Weeks)</div>
            <div id="weeklyChart" class="bar-chart"></div>
        </div>

        <!-- Monthly Chart -->
        <div class="chart-section-compact">
            <div class="chart-title-small">Monthly Distance (This Year)</div>
            <div id="monthlyChart" class="bar-chart"></div>
        </div>

        <!-- Pace Line Chart -->
        <div class="chart-section-compact">
            <div class="chart-title-small">Running Pace Over Time (min/mi)</div>
            <div id="paceChart" class="line-chart-container"></div>
        </div>
    </div>
</div>

<!-- JavaScript Files (order matters for dependencies) -->
<script src="js/data.js"></script>
<script src="js/stats.js"></script>
<script src="js/charts.js"></script>
<script src="js/training.js"></script>
<script src="js/ui.js"></script>
<script src="js/app.js"></script>

</body>
</html>
