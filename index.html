<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Run Tracker</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<header>
    <h1>Running Tracker</h1>
</header>

<!-- Tab Navigation -->
<div class="tab-nav">
    <button class="tab-btn active" onclick="switchTab('home')">Home</button>
    <button class="tab-btn" onclick="switchTab('stats')">Stats</button>
</div>

<!-- Home Tab -->
<div id="homeTab" class="tab-content active">
    <div class="stats-grid">
        <div class="stat-card">
            <h3>Week</h3>
            <div class="value" id="weekTotal">0</div>
            <div class="unit">Miles</div>
            <div class="change neutral" id="weekChange">--</div>
        </div>
        <div class="stat-card">
            <h3>Month</h3>
            <div class="value" id="monthTotal">0</div>
            <div class="unit">Miles</div>
            <div class="change neutral" id="monthChange">--</div>
        </div>
        <div class="stat-card">
            <h3>Year</h3>
            <div class="value" id="yearTotal">0</div>
            <div class="unit">Miles</div>
        </div>
    </div>

    <div class="input-section">
        <div class="input-row">
            <div class="input-group">
                <label>Date</label>
                <input type="date" id="dateInput">
            </div>
            <div class="input-group">
                <label>Distance (mi)</label>
                <input type="number" id="distanceInput" placeholder="0.0" inputmode="decimal" step="0.01">
            </div>
            <div class="input-group">
                <label>Duration (min)</label>
                <input type="number" id="durationInput" placeholder="0" inputmode="decimal" step="0.1">
            </div>
        </div>
        <button class="add-btn" onclick="addRun()">Add Run</button>
        <button class="download-btn" onclick="downloadCSV()">Download Data</button>
    </div>

    <div class="history-section">
        <div class="history-header">Recent Activity</div>
        <div class="table-wrapper">
            <table id="historyTable">
                <tbody id="historyBody"></tbody>
            </table>
        </div>
    </div>
</div>

<!-- Stats Tab -->
<div id="statsTab" class="tab-content">
    <div class="stats-scroll">
        <!-- Goal Tracking -->
        <div class="goal-section">
            <div class="chart-title-small">🎯 Yearly Goals</div>
            <div id="goalTracking"></div>
        </div>

        <!-- Weekly Chart -->
        <div class="chart-section-compact">
            <div class="chart-title-small">Weekly Distance (Last 12 Weeks)</div>
            <div id="weeklyChart" class="bar-chart"></div>
        </div>

        <!-- Monthly Chart -->
        <div class="chart-section-compact">
            <div class="chart-title-small">Monthly Distance (This Year)</div>
            <div id="monthlyChart" class="bar-chart"></div>
        </div>
    </div>
</div>

<!-- JavaScript Files (order matters for dependencies) -->
<script src="js/data.js"></script>
<script src="js/stats.js"></script>
<script src="js/charts.js"></script>
<script src="js/ui.js"></script>
<script src="js/app.js"></script>

</body>
</html>
